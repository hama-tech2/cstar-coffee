<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C-Star Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── Variables ─────────────────────────────────── */
    :root {
      --bg:       #0c0804;
      --bg2:      #160e08;
      --bg3:      #1e1409;
      --gold:     #c8913a;
      --gold-lt:  #e8b85c;
      --gold-pale:#f5d89b;
      --cream:    #f5ede0;
      --text:     #ddc9a8;
      --muted:    #8a7060;
      --card:     #1a100a;
      --border:   rgba(200,145,58,.18);
      --r:        16px;
      --nav:      70px;
      --tr:       0.32s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans Arabic',sans-serif;overflow-x:hidden;min-height:100vh;line-height:1.65}
    body.lang-ar,body.lang-ku{font-family:'Noto Sans Arabic',sans-serif}
    img{display:block;max-width:100%}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;border:none;background:none;font-family:inherit}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

    /* ── Noise texture overlay ─────────────────────── */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity:.4;
    }
    section,nav,footer{position:relative;z-index:1}

    /* ── Navigation ────────────────────────────────── */
    #nav{
      position:fixed;top:0;inset-inline-start:0;inset-inline-end:0;z-index:999;
      height:var(--nav);
      background:rgba(12,8,4,.8);
      backdrop-filter:blur(24px) saturate(1.6);
      border-bottom:1px solid var(--border);
      transition:background var(--tr);
    }
    #nav.solid{background:rgba(12,8,4,.98)}
    .nav-wrap{
      max-width:1220px;margin:0 auto;height:100%;
      padding:0 24px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;
    }
    .nav-logo{height:46px;width:46px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(200,145,58,.55))}
    .nav-links{display:flex;list-style:none;gap:4px}
    .nav-links a{
      padding:7px 15px;border-radius:9px;
      font-size:.875rem;font-weight:500;color:var(--muted);
      transition:color var(--tr),background var(--tr);
    }
    .nav-links a:hover{color:var(--gold-lt);background:rgba(200,145,58,.08)}
    .nav-right{display:flex;align-items:center;gap:12px}

    /* lang switcher */
    .lang-sw{
      display:flex;background:rgba(255,255,255,.04);
      border:1px solid var(--border);border-radius:10px;overflow:hidden;
    }
    .lang-btn{
      padding:6px 13px;font-size:.75rem;font-weight:700;
      color:var(--muted);letter-spacing:.04em;transition:all var(--tr);
    }
    .lang-btn.on{background:var(--gold);color:#0c0804}
    .lang-btn:not(.on):hover{background:rgba(200,145,58,.14);color:var(--gold-lt)}

    /* hamburger */
    .ham{display:none;flex-direction:column;gap:5px;padding:8px;border-radius:8px;transition:background var(--tr)}
    .ham:hover{background:rgba(200,145,58,.08)}
    .ham span{width:24px;height:2px;background:var(--gold-lt);border-radius:2px;transition:all var(--tr);display:block}
    .ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .ham.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    /* mobile nav */
    .mob-nav{
      display:none;flex-direction:column;
      position:fixed;top:var(--nav);inset-inline-start:0;inset-inline-end:0;z-index:998;
      background:rgba(12,8,4,.97);backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      padding:16px 24px 20px;gap:4px;
    }
    .mob-nav.open{display:flex}
    .mob-nav a{
      padding:13px 16px;border-radius:10px;
      color:var(--muted);font-size:1rem;font-weight:500;
      transition:all var(--tr);
    }
    .mob-nav a:hover{color:var(--gold-lt);background:rgba(200,145,58,.08)}

    /* ── Hero ──────────────────────────────────────── */
    #hero{
      position:relative;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .hero-bg{
      position:absolute;inset:0;
      background:url('https://github.com/hama-tech2/cstar-coffee/blob/main/hero.jpg?raw=true') center/cover no-repeat;
      transform:scale(1.12);will-change:transform;
    }
    .hero-veil{
      position:absolute;inset:0;
      background:linear-gradient(150deg,rgba(12,8,4,.9) 0%,rgba(12,8,4,.55) 55%,rgba(12,8,4,.82) 100%);
    }
    .hero-veil2{
      position:absolute;inset:0;
      background:radial-gradient(ellipse 80% 70% at 50% 120%,rgba(200,145,58,.08) 0%,transparent 70%);
    }
    .hero-content{
      position:relative;z-index:2;text-align:center;
      max-width:720px;padding:0 24px;
      animation:heroUp 1.1s ease both;
    }
    @keyframes heroUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
    .hero-pill{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(200,145,58,.12);border:1px solid rgba(200,145,58,.35);
      color:var(--gold-lt);padding:7px 20px;border-radius:30px;
      font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      margin-bottom:22px;animation:heroUp 1.1s .15s ease both;
    }
    .hero-logo{
      width:96px;height:96px;object-fit:contain;margin:0 auto 22px;
      filter:drop-shadow(0 6px 24px rgba(200,145,58,.6));
      animation:float 3.5s ease-in-out infinite,heroUp 1s .05s both;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    h1.hero-title{
      font-family:'Playfair Display',Georgia,serif;
      font-size:clamp(2.6rem,7vw,5rem);font-weight:900;
      color:var(--cream);line-height:1.08;margin-bottom:18px;
      animation:heroUp 1.1s .2s ease both;
      letter-spacing:-.02em;
    }
    h1.hero-title em{color:var(--gold);font-style:normal}
    .hero-sub{
      font-size:1.05rem;color:rgba(245,237,224,.72);
      max-width:480px;margin:0 auto 38px;line-height:1.75;
      animation:heroUp 1.1s .3s ease both;
    }
    .hero-btns{
      display:flex;justify-content:center;gap:14px;flex-wrap:wrap;
      animation:heroUp 1.1s .4s ease both;
    }
    .btn-gold{
      padding:14px 30px;
      background:linear-gradient(135deg,var(--gold) 0%,#a86e22 100%);
      color:#0c0804;font-weight:700;font-size:.93rem;border-radius:12px;
      box-shadow:0 4px 22px rgba(200,145,58,.38);
      transition:all var(--tr);display:inline-flex;align-items:center;gap:8px;
    }
    .btn-gold:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(200,145,58,.55)}
    .btn-ghost{
      padding:14px 30px;
      border:1.5px solid rgba(200,145,58,.45);
      color:var(--gold-lt);font-weight:600;font-size:.93rem;border-radius:12px;
      transition:all var(--tr);display:inline-flex;align-items:center;gap:8px;
    }
    .btn-ghost:hover{background:rgba(200,145,58,.1);border-color:var(--gold);transform:translateY(-3px)}
    .hero-scroll{
      position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:8px;
      color:var(--muted);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
      animation:scrollPulse 2.2s ease infinite;
    }
    @keyframes scrollPulse{0%,100%{transform:translateX(-50%) translateY(0);opacity:.6}50%{transform:translateX(-50%) translateY(7px);opacity:1}}
    .scroll-arr{width:16px;height:16px;border-right:2px solid var(--gold);border-bottom:2px solid var(--gold);transform:rotate(45deg)}

    /* ── Section base ──────────────────────────────── */
    .sec{padding:96px 24px}
    .sec-in{max-width:1220px;margin:0 auto}
    .sec-label{font-size:.75rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
    .sec-title{
      font-family:'Playfair Display',Georgia,serif;
      font-size:clamp(1.9rem,4vw,3.2rem);font-weight:800;color:var(--cream);
      line-height:1.15;margin-bottom:14px;
    }
    body.lang-ar .sec-title,body.lang-ku .sec-title{font-family:'Noto Sans Arabic',sans-serif;font-weight:800}
    .sec-line{width:52px;height:3px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:3px;margin-bottom:28px}
    [dir="rtl"] .sec-line{background:linear-gradient(270deg,var(--gold),transparent)}

    /* ── About ─────────────────────────────────────── */
    #about{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
    .about-txt p{color:var(--muted);line-height:1.85;margin-bottom:18px;font-size:1.02rem}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:32px}
    .stat-box{
      background:rgba(200,145,58,.07);border:1px solid var(--border);
      border-radius:14px;padding:18px 14px;text-align:center;
      transition:all var(--tr);
    }
    .stat-box:hover{background:rgba(200,145,58,.13);transform:translateY(-3px)}
    .stat-n{font-size:2rem;font-weight:900;color:var(--gold);font-family:'Playfair Display',serif}
    .stat-l{font-size:.78rem;color:var(--muted);margin-top:4px}
    .about-img{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:4/3;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .about-img img{width:100%;height:100%;object-fit:cover;transition:transform .8s ease}
    .about-img:hover img{transform:scale(1.04)}
    .about-img::after{content:'';position:absolute;inset:0;border:1.5px solid rgba(200,145,58,.25);border-radius:20px;pointer-events:none}
    .about-img-badge{
      position:absolute;bottom:16px;inset-inline-end:16px;
      background:rgba(12,8,4,.85);backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:10px;
      padding:10px 14px;display:flex;align-items:center;gap:8px;
    }
    .about-stars{color:#f5c518;font-size:.85rem;letter-spacing:2px}
    .about-rate{font-size:.8rem;font-weight:700;color:var(--cream)}

    /* ── Menu ──────────────────────────────────────── */
    #menu{background:var(--bg)}
    .menu-head{text-align:center;margin-bottom:52px}
    .menu-head .sec-line{margin-inline:auto}

    /* Talabat bar */
    .tal-bar{
      display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;
      background:linear-gradient(135deg,rgba(255,102,0,.1),rgba(255,70,0,.06));
      border:1px solid rgba(255,102,0,.22);border-radius:16px;
      padding:18px 28px;margin-bottom:48px;
    }
    .tal-txt{color:var(--cream);font-size:.98rem;font-weight:500}
    .btn-tal{
      padding:10px 24px;
      background:linear-gradient(135deg,#ff6600,#cc4400);
      color:#fff;font-weight:700;font-size:.88rem;border-radius:10px;
      box-shadow:0 4px 16px rgba(255,102,0,.35);
      transition:all var(--tr);display:inline-flex;align-items:center;gap:7px;
    }
    .btn-tal:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,102,0,.5)}

    /* tabs */
    .tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-bottom:44px}
    .tab{
      padding:8px 18px;border-radius:30px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
      color:var(--muted);font-size:.83rem;font-weight:600;
      transition:all var(--tr);
    }
    .tab:hover{border-color:var(--gold);color:var(--gold-lt)}
    .tab.on{background:var(--gold);border-color:var(--gold);color:#0c0804}

    /* grid */
    .menu-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:22px;
    }
    .card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;transition:all var(--tr);cursor:pointer;
      opacity:0;transform:translateY(18px);
      animation:cardIn .45s ease forwards;
    }
    @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
    .card:hover{transform:translateY(-7px);border-color:rgba(200,145,58,.5);box-shadow:0 22px 44px rgba(0,0,0,.45),0 0 0 1px rgba(200,145,58,.08)}
    .card-img{position:relative;aspect-ratio:4/3;overflow:hidden;background:#1e1208}
    .card-img img{width:100%;height:100%;object-fit:cover;transition:transform .65s cubic-bezier(.4,0,.2,1)}
    .card:hover .card-img img{transform:scale(1.1)}
    .card-badge{
      position:absolute;top:10px;inset-inline-start:10px;
      background:rgba(12,8,4,.82);backdrop-filter:blur(10px);
      border:1px solid var(--border);color:var(--gold-lt);
      font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:20px;
      letter-spacing:.04em;
    }
    .card-hover-layer{
      position:absolute;inset:0;
      background:rgba(12,8,4,.45);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity var(--tr);
    }
    .card:hover .card-hover-layer{opacity:1}
    .zoom-circle{
      width:46px;height:46px;border-radius:50%;
      background:rgba(200,145,58,.92);
      display:flex;align-items:center;justify-content:center;
      color:#0c0804;font-size:1rem;
      transform:scale(.7);transition:transform var(--tr);
    }
    .card:hover .zoom-circle{transform:scale(1)}
    .card-body{padding:15px 16px}
    .card-name{font-size:.96rem;font-weight:700;color:var(--cream);margin-bottom:5px;line-height:1.3}
    .card-desc{
      font-size:.78rem;color:var(--muted);line-height:1.55;margin-bottom:13px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card-foot{
      display:flex;align-items:center;justify-content:space-between;
      padding-top:11px;border-top:1px solid rgba(255,255,255,.055);
    }
    .card-price{font-size:1rem;font-weight:800;color:var(--gold);font-family:'Playfair Display',serif}
    .card-price sub{font-size:.68rem;color:var(--muted);font-weight:400;font-family:inherit}
    .card-order{
      display:inline-flex;align-items:center;gap:5px;
      padding:6px 11px;
      background:rgba(255,102,0,.1);border:1px solid rgba(255,102,0,.28);
      color:#ff7733;font-size:.73rem;font-weight:700;border-radius:8px;
      transition:all var(--tr);
    }
    .card-order:hover{background:rgba(255,102,0,.22);border-color:rgba(255,102,0,.55)}

    /* ── Lightbox ──────────────────────────────────── */
    #lb{
      display:none;position:fixed;inset:0;z-index:9999;
      background:rgba(0,0,0,.88);backdrop-filter:blur(8px);
      align-items:center;justify-content:center;padding:20px;
    }
    #lb.on{display:flex}
    .lb-box{
      position:relative;max-width:680px;width:100%;
      background:var(--card);border:1px solid var(--border);border-radius:22px;
      overflow:hidden;animation:lbIn .3s ease both;
    }
    @keyframes lbIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
    .lb-img{position:relative;aspect-ratio:16/10;background:#1a1008}
    .lb-img img{width:100%;height:100%;object-fit:cover}
    .lb-info{padding:24px 28px}
    .lb-name{font-size:1.45rem;font-weight:800;color:var(--cream);margin-bottom:8px}
    .lb-desc{color:var(--muted);line-height:1.75;margin-bottom:18px}
    .lb-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .lb-price{font-size:1.4rem;font-weight:900;color:var(--gold);font-family:'Playfair Display',serif}
    .lb-close{
      position:absolute;top:14px;inset-inline-end:14px;
      width:38px;height:38px;border-radius:50%;
      background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.12);
      color:var(--cream);font-size:1.1rem;
      display:flex;align-items:center;justify-content:center;
      transition:all var(--tr);z-index:2;
    }
    .lb-close:hover{background:rgba(200,145,58,.85);color:#0c0804;border-color:transparent}

    /* ── Contact ───────────────────────────────────── */
    #contact{background:var(--bg2);border-top:1px solid var(--border)}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:start}
    .c-cards{display:flex;flex-direction:column;gap:14px}
    .c-card{
      background:rgba(255,255,255,.026);border:1px solid var(--border);
      border-radius:14px;padding:18px 20px;
      display:flex;align-items:center;gap:15px;
      transition:all var(--tr);text-decoration:none;color:inherit;
    }
    .c-card:hover{border-color:rgba(200,145,58,.45);background:rgba(200,145,58,.05);transform:translateX(4px)}
    [dir="rtl"] .c-card:hover{transform:translateX(-4px)}
    .c-icon{
      width:48px;height:48px;border-radius:12px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:1.25rem;
    }
    .c-icon.wa{background:rgba(37,211,102,.14);color:#25d366}
    .c-icon.ig{background:rgba(193,53,132,.14);color:#e1306c}
    .c-icon.map{background:rgba(200,145,58,.14);color:var(--gold)}
    .c-lbl{font-size:.72rem;color:var(--muted);margin-bottom:3px}
    .c-val{font-size:.93rem;font-weight:600;color:var(--cream)}
    .map-box{
      border-radius:18px;overflow:hidden;
      border:1px solid var(--border);height:300px;
      box-shadow:0 16px 40px rgba(0,0,0,.35);
    }
    .map-box iframe{width:100%;height:100%;border:none;display:block}

    /* ── Footer ────────────────────────────────────── */
    footer{
      background:#080503;border-top:1px solid var(--border);
      padding:36px 24px;text-align:center;
    }
    .ft-logo{height:48px;margin:0 auto 18px;opacity:.8}
    .ft-soc{display:flex;justify-content:center;gap:12px;margin-bottom:22px}
    .soc-btn{
      width:42px;height:42px;border-radius:10px;
      background:rgba(255,255,255,.04);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      color:var(--muted);font-size:1.05rem;transition:all var(--tr);
    }
    .soc-btn:hover{background:rgba(200,145,58,.14);border-color:var(--gold);color:var(--gold-lt);transform:translateY(-2px)}
    .ft-copy{font-size:.78rem;color:var(--muted)}

    /* ── WhatsApp float ────────────────────────────── */
    #wa{
      position:fixed;bottom:26px;inset-inline-end:26px;z-index:800;
      width:58px;height:58px;border-radius:50%;
      background:linear-gradient(135deg,#25d366,#128c7e);
      box-shadow:0 4px 22px rgba(37,211,102,.45);
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:1.55rem;transition:transform var(--tr);
      animation:waPop .6s .8s ease both,waPulse 2.5s 1.5s ease infinite;
    }
    @keyframes waPop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
    @keyframes waPulse{
      0%,100%{box-shadow:0 4px 22px rgba(37,211,102,.45)}
      50%{box-shadow:0 4px 32px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.08)}
    }
    #wa:hover{transform:scale(1.12)}

    /* ── Fade-in scroll ────────────────────────────── */
    .fi{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease}
    .fi.d1{transition-delay:.1s}
    .fi.d2{transition-delay:.2s}
    .fi.d3{transition-delay:.3s}
    .fi.vis{opacity:1;transform:translateY(0)}

    /* ── Responsive ────────────────────────────────── */
    @media(max-width:920px){
      .nav-links{display:none}
      .ham{display:flex}
      .about-grid{grid-template-columns:1fr;gap:40px}
      .about-img{order:-1}
      .menu-grid{grid-template-columns:repeat(2,1fr);gap:16px}
      .contact-grid{grid-template-columns:1fr;gap:36px}
      .stat-row{grid-template-columns:1fr 1fr}
    }
    @media(max-width:520px){
      .menu-grid{grid-template-columns:repeat(2,1fr);gap:10px}
      .card-body{padding:11px 12px}

   n:{ku:'پانکێک',ar:'بان كيك',en:'Pancakes'},
   d:{ku:'پانکێکی نەرم و خوێند لەگەڵ شەربەت',ar:'بان كيك طري يقدم مع شيرة',en:'Fluffy homestyle pancakes served with syrup'},
   p:'4,000'}
];

/* ── State ─────────────────────────────────────── */
let lang = 'ku', activeCat = 'all';

/* ── setLang ───────────────────────────────────── */
function setLang(l){
  lang = l;
  const b = document.body;
  b.className = 'lang-'+l;
  b.dir = l==='en'?'ltr':'rtl';
  document.documentElement.lang = l==='ku'?'ckb':l;
  document.querySelectorAll('.t[data-k]').forEach(el=>{
    const v = T[l][el.dataset.k];
    if(v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('.lang-btn').forEach(b2=>{
    b2.classList.toggle('on', b2.dataset.l===l);
  });
  renderGrid(activeCat);
}

/* ── render ────────────────────────────────────── */
function catLabel(c){
  return T[lang].catNames[c]||c;
}
function renderGrid(cat){
  const g = document.getElementById('menuGrid');
  const list = cat==='all'? items : items.filter(i=>i.c===cat);
  g.innerHTML = list.map((it,i)=>{
    const delay = (i*0.04).toFixed(2);
    return `<div class="card" style="animation-delay:${delay}s" onclick="lbOpen(${items.indexOf(it)})">
      <div class="card-img">
        <img src="${BASE}${it.img}?raw=true" alt="${it.n[lang]}" loading="lazy">
        <div class="card-badge">${catLabel(it.c)}</div>
        <div class="card-hover-layer"><div class="zoom-circle"><i class="fas fa-search-plus"></i></div></div>
      </div>
      <div class="card-body">
        <div class="card-name">${it.n[lang]}</div>
        <div class="card-desc">${it.d[lang]}</div>
        <div class="card-foot">
          <div class="card-price">${it.p} <sub>IQD</sub></div>
          <a href="https://www.talabat.com/ar/iraq/c-star-coffee" target="_blank" class="card-order" onclick="event.stopPropagation()">
            <i class="fas fa-motorcycle"></i>${T[lang].orderTal}
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── filter ────────────────────────────────────── */
function filter(cat){
  activeCat = cat;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.c===cat));
  const g = document.getElementById('menuGrid');
  g.style.cssText = 'opacity:0;transform:translateY(12px);transition:all .22s ease';
  setTimeout(()=>{
    renderGrid(cat);
    g.style.cssText = 'opacity:1;transform:translateY(0);transition:all .22s ease';
  },220);
}

/* ── Lightbox ──────────────────────────────────── */
function lbOpen(idx){
  const it = items[idx];
  document.getElementById('lbImg').src = BASE+it.img+'?raw=true';
  document.getElementById('lbImg').alt = it.n[lang];
  document.getElementById('lbName').textContent = it.n[lang];
  document.getElementById('lbDesc').textContent = it.d[lang];
  document.getElementById('lbPrice').textContent = it.p+' IQD';
  // update talabat button text
  const talSpan = document.querySelector('#lb .t[data-k="orderTal"]');
  if(talSpan) talSpan.textContent = T[lang].orderTal;
  document.getElementById('lb').classList.add('on');
  document.body.style.overflow='hidden';
}
function lbClose(e){
  if(!e || e.target===document.getElementById('lb') || e.currentTarget.tagName==='BUTTON'){
    document.getElementById('lb').classList.remove('on');
    document.body.style.overflow='';
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')lbClose()});

/* ── Mobile Nav ────────────────────────────────── */
function toggleMob(){
  document.getElementById('mobNav').classList.toggle('open');
  document.getElementById('ham').classList.toggle('open');
}

/* ── Nav scroll ────────────────────────────────── */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('solid',scrollY>60);
  const bg = document.getElementById('heroBg');
  if(bg) bg.style.transform=`scale(1.12) translateY(${scrollY*.25}px)`;
},{passive:true});

/* ── Intersection observer ─────────────────────── */
const obs = new IntersectionObserver(ents=>{
  ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target)}});
},{threshold:.1});
document.querySelectorAll('.fi').forEach(el=>obs.observe(el));

/* ── Init ──────────────────────────────────────── */
setLang('ku');
</script>
</body>
</html>
